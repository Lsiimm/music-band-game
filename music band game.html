<!DOCTYPE html>

    <style> 

        * {

            margin: 0; 

            padding: 0; 

        } 

         

        body {

            display: flex; 

            justify-content: center; 

            padding: 16px; 

            color: #e0e0e0; 

        } 

         

        .game-container {

            backdrop-filter: blur(10px); 

            border-radius: 32px;

        }

            font-weight: 600; 

            text-align: center; 

            margin-bottom: 8px; 

            background: linear-gradient(135deg, #ffd966, #b8860b); 

            -webkit-background-clip: text; 

            -webkit-text-fill-color: transparent; 

            letter-spacing: 1px; 

        } 

         

        .subtitle { 

            text-align: center; 

            color: #a89cc0; 

            margin-bottom: 24px; 

            font-size: 16px;

        }

            text-align: center; 

            border: 1px solid #6b4f7c; 

        }

            color: #e2d1ff; 

        }

            border: 2px solid #8a6ea9; 

            color: white; 

            font-size: 18px; 

            padding: 14px 20px; 

            border-radius: 60px; 

            width: 100%; 

            outline: none; 

            transition: 0.2s; 

        } 

         

        #player-name-input:focus { 

            border-color: #ffb347; 

            box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.3); 

        }

            background: linear-gradient(145deg, #6b4e8e, #3f2b5a);

            border: none; 

            font-size: 22px; 

            font-weight: bold; 

            padding: 16px 20px; 

            border-radius: 60px; 

            width: 100%; 

            margin-top: 20px; 

            box-shadow: 0 8px 0 #2a1a38; 

            transition: 0.1s ease; 

            cursor: pointer; 

            border: 1px solid #b491d5; 

        } 

         

        .start-btn:active { 

            transform: translateY(5px); 

            box-shadow: 0 3px 0 #2a1a38; 

        } 

         

        .question-box { 

            background: #1d1427; 

            border-radius: 36px; 

            padding: 24px 20px; 

            margin: 20px 0; 

            border: 1px solid #8d6ea8; 

            box-shadow: inset 0 2px 5px #0d0a12; 

        } 

         

        .question-text { 

            font-size: 22px; 

            font-weight: 600; 

            line-height: 1.4; 

            margin-bottom: 24px; 

            color: #f3e7ff; 

            word-break: break-word; 

        } 

         

        .options-container { 

            display: flex; 

            flex-direction: column; 

            gap: 12px; 

        } 

         

        .option-btn { 

            background: #292037; 

            border: 2px solid #6b4f88; 

            color: #f0e4ff; 

            padding: 16px 18px; 

            border-radius: 50px; 

            font-size: 18px; 

            text-align: left; 

            word-break: break-word; 

            cursor: pointer; 

            transition: all 0.15s; 

            font-weight: 500; 

            box-shadow: 0 4px 0 #1b1223; 

        }

            box-shadow: 0 1px 0 #1b1223; 

            background: #392c48; 

            border-color: #b28cd9;

            background: #2a1d31; 

            border-left: 6px solid #c79b42; 

            padding: 16px 20px; 

            border-radius: 30px; 

            margin: 16px 0 8px;

            color: #eeddbb;

        }

            padding: 16px; 

            margin-top: 20px; 

            color: #b7a4d4; 

        }

            text-align: center; 

            margin-top: 25px; 

            color: #6a5a7c; 

            font-size: 14px; 

        } 

         

        .hidden { 

            display: none !important; 

        } 

    </style> 

</head>

                if (!q) return; 

                 

                questionText.innerText = q.text; 

                optionsContainer.innerHTML = ''; 

                 

                q.options.forEach((opt, index) => { 

                    const btn = document.createElement('button'); 

                    btn.className = 'option-btn'; 

                    btn.innerText = opt.text; 

                    btn.dataset.optionIdx = index + 1; 

                    btn.dataset.score = opt.score; 

                    btn.addEventListener('click', onOptionClick); 

                    optionsContainer.appendChild(btn); 

                }); 

                 

                answerLock = false; 

                nextBtn.disabled = true; 

                reactionBox.innerText = '👤 Артём ждёт твоего решения...'; 

            } 

 

            // Клик на вариант 

            function onOptionClick(e) { 

                if (answerLock) return; 

                 

                const btn = e.currentTarget; 

                const optionIdx = btn.dataset.optionIdx; 

                const score = parseInt(btn.dataset.score, 10); 

                 

                riskScore += score; 

                showReaction(currentQuestionId, optionIdx); 

                 

                const allOptions = document.querySelectorAll('.option-btn'); 

                allOptions.forEach(opt => opt.style.pointerEvents = 'none'); 

                btn.style.background = '#4a2e62'; 

                btn.style.borderColor = '#e5b85c'; 

                 

                answerLock = true; 

                nextBtn.disabled = false; 

            } 

 

            // Далее 

            function goToNext() { 

                if (!answerLock && currentQuestionId <= totalQuestions) return; 

                 

                currentQuestionId++; 

                 

                if (currentQuestionId <= totalQuestions) { 

                    const allOptions = document.querySelectorAll('.option-btn'); 

                    allOptions.forEach(opt => { 

                        opt.style.pointerEvents = 'auto'; 

                        opt.style.background = ''; 

                        opt.style.borderColor = ''; 

                    }); 

                    loadQuestion(currentQuestionId); 

                } else { 

                    showFinal(); 

                } 

            } 

 

            // ФИНАЛ 

            function showFinal() { 

                questionBlock.classList.add('hidden'); 

                nextBtn.classList.add('hidden'); 

                finalBlock.classList.remove('hidden'); 

                 

                let finalMessage = ''; 

                if (riskScore <= 17) { 

                    finalMessage = '🟢 Финал 1: Вы почти не поддались влиянию группы и решили уйти. Вы сохраняете независимость, критическое мышление и связь с внешним миром.'; 

                } else { 

                    finalMessage = '🟡 Финал 2: Вы частично вовлечены в группу и практики. Вы чувствуете духовную связь, но сохраняете возможность сомневаться и выйти при желании.'; 

                } 

                 

                finalText.innerText = finalMessage; 

                finalScoreInfo.innerText = `Ваша вовлечённость: ${riskScore} / ${maxScore}`; 

                 

                // Отправка статистики 

                sendStatistic(riskScore, playerName); 

            } 

 

            // Отправка в Яндекс.Форму 

            function sendStatistic(score, name) { 

                const link = document.createElement('a'); 

                link.href = `https://forms.yandex.ru/cloud/69a5e08e493639a7ca7ff4a8/?name=${encodeURIComponent(name)}&score=${score}`; 

                link.target = '_blank'; 

                link.click(); 

                console.log(`📊 Статистика: ${name}, счёт ${score}`); 

            } 

 

            // Старт игры 

            function startGame() { 

                playerName = playerNameInput.value.trim() || "Игрок"; 

                gamePlayerNameDisplay.innerText = `🎸 ${playerName}`; 

                 

                riskScore = 0; 

                currentQuestionId = 1; 

                answerLock = false; 

                 

                nameScreen.classList.add('hidden'); 

                gameScreen.classList.remove('hidden'); 

                finalBlock.classList.add('hidden'); 

                questionBlock.classList.remove('hidden'); 

                nextBtn.classList.remove('hidden'); 

                 

                loadQuestion(1); 

            } 

 

            // Перезапуск 

            function restartGame() { 

                nameScreen.classList.remove('hidden'); 

                gameScreen.classList.add('hidden'); 

                playerNameInput.value = playerName; 

            } 

 

            // События 

            startBtn.addEventListener('click', startGame); 

            nextBtn.addEventListener('click', goToNext); 

            restartBtn.addEventListener('click', restartGame); 

             

            playerNameInput.addEventListener('keypress', (e) => { 

                if (e.key === 'Enter') startGame(); 

            }); 

        })(); 

    </script> 

</body> 

</html>
